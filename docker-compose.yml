services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: career_os
      POSTGRES_PASSWORD: career_os
      POSTGRES_DB: career_os
    ports: ["${POSTGRES_HOST_PORT:-55434}:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career_os -d career_os"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://career_os:career_os@postgres:5432/career_os?schema=public
      CAREER_OS_COMMAND_RUNTIME: prisma
    restart: "no"
  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports: ["3000:3000"]
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://career_os:career_os@postgres:5432/career_os?schema=public
      REDIS_URL: redis://redis:6379
      CAREER_OS_COMMAND_RUNTIME: prisma
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-client_placeholder}
      WORKOS_API_KEY: ${WORKOS_API_KEY:-sk_test_placeholder}
      WORKOS_COOKIE_PASSWORD: ${WORKOS_COOKIE_PASSWORD:-placeholder-cookie-password-at-least-32-chars}
      NEXT_PUBLIC_WORKOS_REDIRECT_URI: ${NEXT_PUBLIC_WORKOS_REDIRECT_URI:-http://localhost:3000/auth/callback}
      WORKOS_BASE_URL: ${WORKOS_BASE_URL:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
volumes:
  postgres_data:
