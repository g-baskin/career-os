services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: career_os
      POSTGRES_PASSWORD: career_os
      POSTGRES_DB: career_os
    ports: ["${POSTGRES_HOST_PORT:-55434}:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
volumes:
  postgres_data:
